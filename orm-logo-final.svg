<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#e8d5a3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="#0a0a0a"/>

  <!-- Gold box — sized to fit ORM perfectly -->
  <rect x="40" y="45" width="168" height="70" fill="#c9a84c"/>

  <!-- ORM inside box in black — centered in box -->
  <text x="54" y="100" font-family="Georgia, serif" font-size="50" font-weight="700" letter-spacing="2" fill="#0a0a0a">ORM</text>

  <!-- Vertical gold divider line -->
  <rect x="220" y="45" width="2" height="70" fill="#c9a84c" opacity="0.35"/>

  <!-- FLOORING -->
  <text x="238" y="84" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="3" fill="#ffffff">FLOORING</text>

  <!-- & SERVICES LLC -->
  <text x="238" y="106" font-family="Arial, sans-serif" font-size="11" font-weight="300" letter-spacing="6" fill="url(#g3)">&amp; SERVICES LLC</text>

  <!-- Underline detail -->
  <rect x="238" y="113" width="225" height="1" fill="#c9a84c" opacity="0.3"/>

  <!-- Utah tag -->
  <text x="238" y="130" font-family="Arial, sans-serif" font-size="9" letter-spacing="4" fill="#8a8880">LICENSED &amp; INSURED · UTAH</text>

  <!-- Floor plank pattern right -->
  <g transform="translate(500, 72)" opacity="0.35">
    <rect x="0" y="0"  width="68" height="8" rx="1" fill="#c9a84c"/>
    <rect x="0" y="13" width="43" height="8" rx="1" fill="#c9a84c"/>
    <rect x="48" y="13" width="20" height="8" rx="1" fill="#c9a84c"/>
    <rect x="0" y="26" width="20" height="8" rx="1" fill="#c9a84c"/>
    <rect x="25" y="26" width="43" height="8" rx="1" fill="#c9a84c"/>
    <rect x="0" y="39" width="68" height="8" rx="1" fill="#c9a84c"/>
  </g>
</svg>
